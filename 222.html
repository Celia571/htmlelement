<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rainbow Login</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 400px;
  background: #eaeaea;
  padding: 40px;
  border-radius: 20px;
}

.red {
  color: #e63946;
  letter-spacing: 3px;
}

ul {
  list-style-type: none;
  padding: 0;  
  margin: 0;  
}

.input-group {
  margin: 20px 0;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 10px 0;
  border: none;
  border-bottom: 3px solid;
  border-image: linear-gradient(to right, red, orange, yellow, green, blue, purple) 1;
  background: transparent;
  outline: none;
}

.radio-group {
  margin: 20px 0;
}

.radio-group label {
  display: block;
  margin: 10px 0;
}

.button-wrapper {
  margin-top: 20px;
  padding: 3px;
  border-radius: 30px;
  background: linear-gradient(270deg, red, orange, yellow, green, blue, purple);
  background-size: 600% 600%;
  animation: moveBorder 4s linear infinite;
}

@keyframes moveBorder {
  0% {background-position: 0% 50%;}
  100% {background-position: 100% 50%;}
}

.button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 30px;
  background: #eaeaea;
  font-size: 16px;
  cursor: pointer;
}

.list {
  margin-top: 20px;
}

.list div {
  margin: 8px 0;
}

a {
  display: inline-block;
  margin-top: 10px;
  font-weight: bold;
  text-decoration: none;
  background: linear-gradient(to right, red, orange, yellow, green, blue, purple);
  -webkit-background-clip: text;
  color: transparent;
  font-size: 16px;
}

a:hover {
  transform: scale(1.05);
}

ul {

    list-style-type: none;

}
</style>
</head>

<body>

<div class="card">

  <p class="red">SINGLE SIGN-ON</p>
  <h1>Log in</h1>

  <div class="input-group">
    <label>NetID</label>
    <input type="text">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password">
  </div>

  <div class="radio-group">
    <label><input type="radio" name="major"> Fashion Design</label>
    <label><input type="radio" name="major"> Communication Design</label>
    <label><input type="radio" name="major"> Other</label>
  </div>

  <div class="button-wrapper">
    <button class="button">CONTINUE</button>
  </div>

  <div class="list">

    <ul> 
 <li>🔒 Reset your password</li>
 <li>❓ Look up your NetID</li>
   </ul>
   
    

  <a href="#">Privacy Terms</a>

</div>

</body>
</html>
