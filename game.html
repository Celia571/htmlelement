<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Login</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  background: #222;
  font-family: 'Press Start 2P', cursive;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #cfcfcf;
  padding: 30px;
  border: 4px solid black;
  width: 350px;
}

h1 {
  font-size: 16px;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 20px;
}

label {
  font-size: 10px;
  display: block;
  margin-bottom: 5px;
}

input {
  width: 100%;
  padding: 8px;
  border: 3px solid black;
  background: #fff;
  font-family: inherit;
  font-size: 10px;
}

.radio-group label {
  display: block;
  font-size: 10px;
  margin: 8px 0;
}

input[type="radio"] {
  accent-color: black;
}

.button {
  margin-top: 20px;
  width: 100%;
  padding: 10px;
  border: 4px solid black;
  background: #ffcc00;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 4px 4px 0px black;
}

.button:active {
  transform: translate(4px,4px);
  box-shadow: none;
}

.list {
  margin-top: 20px;
}

.list div {
  font-size: 10px;
  margin: 8px 0;
}

.list div:hover {
  color: red;
  cursor: pointer;
}

a {
  display: inline-block;
  margin-top: 15px;
  font-size: 10px;
  text-decoration: none;
  color: blue;
}

a:hover {
  color: red;
}
</style>
</head>

<body>

<div class="card">

  <h1>LOGIN SYSTEM</h1>

  <div class="input-group">
    <label>USERNAME</label>
    <input type="text">
  </div>

  <div class="input-group">
    <label>PASSWORD</label>
    <input type="password">
  </div>

  <div class="radio-group">
    <label><input type="radio" name="major"> Fashion</label>
    <label><input type="radio" name="major"> Communication</label>
    <label><input type="radio" name="major"> Other</label>
  </div>

  <button class="button">START</button>

  <div class="list">
    <div>▶ Reset Password</div>
    <div>▶ Look up NetID</div>
  </div>

  <a href="#">Privacy / Terms</a>

</div>

</body>
</html>
