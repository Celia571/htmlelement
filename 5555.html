<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chicky Manor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 65%, #9CCC65 65%, #9CCC65 100%);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header-bar {
            width: 95%;
            max-width: 1200px;
            background: white;
            border: 3px solid black;
            border-radius: 40px;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .stat-group { display: flex; flex-direction: column; }
        .stat-label { font-size: 14px; font-weight: bold; color: #333; }
        .stat-value { font-size: 18px; color: #2E7D32; font-weight: bold; }

        .main-space {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .name-input {
            padding: 12px 25px;
            font-size: 18px;
            border: 3px solid black;
            border-radius: 20px;
            text-align: center;
            outline: none;
            width: 250px;
        }
        .role-selector {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }

        .role-option {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .role-option input { transform: scale(1.2); cursor: pointer; }

        .chicky-avatar {
            font-size: 120px;
            user-select: none;
            transition: 0.2s;
            cursor: pointer;
        }
        .chicky-avatar:active { transform: scale(0.9); }

        .footer-actions {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-row { display: flex; gap: 20px; }

        .btn {
            background: #FFD54F;
            border: 3px solid black;
            padding: 12px 40px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 0px black;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px black;
        }

        .help-link {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">
            <div class="stat-group">
                <span class="stat-label">NAME</span>
                <span id="display-name" class="stat-value">???</span>
            </div>
            <div class="stat-group" style="text-align: right;">
                <span class="stat-label">AGE</span>
                <span id="display-age" class="stat-value" style="color: #4CAF50;">1 Month</span>
            </div>
        </div>

        <div class="main-space">
            <input type="text" id="name-field" class="name-input" placeholder="Name your chicky..." oninput="updateName()">
            
            <div class="role-selector">
                <label class="role-option">
                    <input type="radio" name="role" value="🐤" checked onclick="changeRole('🐤')"> 🐤 Chick
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="🐔" onclick="changeRole('🐔')"> 🐔 Hen
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="🐓" onclick="changeRole('🐓')"> 🐓 Rooster
                </label>
            </div>

            <div id="chicky-emoji" class="chicky-avatar">🐥</div>
        </div>

        <div class="footer-actions">
            <div class="btn-row">
                <button class="btn" onclick="action('Resting...')">SLEEP</button>
                <button class="btn" onclick="action('Eating seeds...')">FEEDING</button>
            </div>
            <a href="#" class="help-link">How to take care? →</a>
        </div>
    </div>

    <script>
        function updateName() {
            const val = document.getElementById('name-field').value;
            document.getElementById('display-name').innerText = val || "???";
        }

        function changeRole(emoji) {
            document.getElementById('chicky-emoji').innerText = emoji;
        }

        function action(msg) {
            const name = document.getElementById('name-field').value || "Your pet";
            alert(name + " is " + msg);
        }
    </script>
</body>
</html>
